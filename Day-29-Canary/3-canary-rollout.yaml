apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-webapp
  namespace: default
spec:
  replicas: 5 
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: canary-web
  template:
    metadata:
      labels:
        app: canary-web
    spec:
      containers:
      - name: web
        image: nginx:1.25-alpine 
        ports:
        - containerPort: 80
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {} 
      - setWeight: 50
      - pause: {duration: 10s} 
      