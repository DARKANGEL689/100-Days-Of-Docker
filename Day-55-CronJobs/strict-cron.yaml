apiVersion: batch/v1
kind: CronJob
metadata:
  name: strict-backup
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid 
  successfulJobsHistoryLimit: 2 
  failedJobsHistoryLimit: 1 
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: alpine
            command: ["sleep", "300"]
          restartPolicy: OnFailure
