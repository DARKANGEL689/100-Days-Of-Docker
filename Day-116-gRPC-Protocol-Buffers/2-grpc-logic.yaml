apiVersion: v1
kind: ConfigMap
metadata:
  name: grpc-python-logic
  namespace: default
data:
  server.py: |
    import grpc
    from concurrent import futures
    import time
    
    # These files will be dynamically generated by the initContainer!
    import fraud_check_pb2
    import fraud_check_pb2_grpc

    class FraudDetectionServicer(fraud_check_pb2_grpc.FraudDetectionServiceServicer):
        def AnalyzeTransaction(self, request, context):
            print(f"[gRPC SERVER] Binary payload received for TXN: {request.transaction_id}")
            # Simulated microsecond logic
            is_fraud = request.amount > 10000.0
            score = 0.99 if is_fraud else 0.05
            action = "FREEZE_ASSET" if is_fraud else "PROCEED"
            
            return fraud_check_pb2.FraudAnalysisResponse(
                is_fraudulent=is_fraud,
                risk_score=score,
                action_required=action
            )

    server = grpc.server(futures.ThreadPoolExecutor(max_workers=10))
    fraud_check_pb2_grpc.add_FraudDetectionServiceServicer_to_server(FraudDetectionServicer(), server)
    server.add_insecure_port('[::]:50051')
    print("[gRPC SERVER] Initialized. Listening for HTTP/2 binary streams on port 50051...")
    server.start()
    server.wait_for_termination()

  client.py: |
    import grpc
    import time
    
    import fraud_check_pb2
    import fraud_check_pb2_grpc

    print("[gRPC CLIENT] Establishing persistent HTTP/2 multiplexed channel...")
    # Connecting to the Kubernetes Service DNS
    channel = grpc.insecure_channel('enterprise-grpc-svc.default.svc.cluster.local:50051')
    stub = fraud_check_pb2_grpc.FraudDetectionServiceStub(channel)

    print("[gRPC CLIENT] Executing Sub-Millisecond Binary RPC Call...")
    start_time = time.time()
    
    # We are passing native Python objects, which are instantly serialized to binary
    response = stub.AnalyzeTransaction(fraud_check_pb2.TransactionRequest(
        transaction_id="TXN-999-OMEGA",
        amount=45000.50,
        account_id="USER-777"
    ))
    
    latency = round((time.time() - start_time) * 1000, 4)
    print(f"\n[RPC RESPONSE RECEIVED in {latency} ms]")
    print(f"Fraudulent: {response.is_fraudulent}")
    print(f"Risk Score: {response.risk_score}")
    print(f"Action: {response.action_required}\n")