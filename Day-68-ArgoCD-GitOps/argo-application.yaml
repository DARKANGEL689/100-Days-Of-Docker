apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: the-300-protocol-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/DARKANGEL689/100-Days-Of-Docker.git'
    path: 'Day-68-ArgoCD-GitOps/manifests'
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc' 
    namespace: default
  syncPolicy:
    automated:
      prune: true 
      selfHeal: true 