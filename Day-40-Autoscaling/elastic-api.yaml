apiVersion: apps/v1
kind: Deployment
metadata:
  name: elastic-api
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: elastic-api
  template:
    metadata:
      labels:
        app: elastic-api
    spec:
      containers:
      - name: php-apache
        image: registry.k8s.io/hpa-example
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m 
          limits:
            cpu: 250m 
---
apiVersion: v1
kind: Service
metadata:
  name: elastic-api-service
spec:
  ports:
  - port: 80
  selector:
    app: elastic-api