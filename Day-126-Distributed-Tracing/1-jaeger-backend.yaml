apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-jaeger
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.50
        ports:
        - containerPort: 16686 
        - containerPort: 4317  
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-svc
  namespace: default
spec:
  ports:
  - port: 16686
    name: ui
    targetPort: 16686
  - port: 4317
    name: otlp
    targetPort: 4317
  selector:
    app: jaeger