apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: golden-path-microservice
  title: Enterprise Microservice (Go + Dapr)
  description: Scaffolds a production-ready Golang microservice pre-configured with Dapr sidecars, Istio routing, and ArgoCD pipelines.
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Service Specification
      required:
        - serviceName
        - owner
      properties:
        serviceName:
          title: Name of the Microservice
          type: string
          description: Unique identifier for the service (e.g., fraud-detection-api)
        owner:
          title: Team Owner
          type: string
          description: The GitHub team responsible for this service
  steps:
    - id: fetch-skeleton
      name: Fetching Enterprise Skeleton Code
      action: fetch:template
      input:
        url: ./skeletons/golang-dapr-template
        values:
          name: '{{ parameters.serviceName }}'
          owner: '{{ parameters.owner }}'
    - id: publish-repo
      name: Publishing to Enterprise GitHub
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: 'Autogenerated by Backstage Golden Path.'
        repoUrl: 'github.com?owner={{ parameters.owner }}&repo={{ parameters.serviceName }}'