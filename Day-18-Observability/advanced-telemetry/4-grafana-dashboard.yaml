apiVersion: v1
kind: ConfigMap
metadata:
  name: podinfo-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1" 
data:
  podinfo.json: |
    {
      "title": "Podinfo Traffic Dashboard",
      "tags": ["templated"],
      "timezone": "browser",
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP Request Rate",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            { "expr": "rate(http_requests_total[1m])", "legendFormat": "{{status}}" }
          ]
        }
      ]
    }