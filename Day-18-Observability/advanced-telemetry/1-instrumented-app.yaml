apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: podinfo
  template:
    metadata:
      labels:
        app: podinfo
    spec:
      containers:
      - name: podinfod
        image: stefanprodan/podinfo:6.4.0
        ports:
        - name: http
          containerPort: 9898
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-app-service
  namespace: default
  labels:
    app: podinfo
spec:
  ports:
  - name: http
    port: 9898
    targetPort: 9898
  selector:
    app: podinfo