apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-cache-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-redis
  template:
    metadata:
      labels:
        app: semantic-redis
    spec:
      containers:
      - name: redis
        image: redis/redis-stack:latest
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: semantic-cache-svc
spec:
  ports:
  - port: 6379
  selector:
    app: semantic-redis