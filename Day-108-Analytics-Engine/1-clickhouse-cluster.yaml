apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: "enterprise-analytics"
  namespace: "default"
spec:
  configuration:
    clusters:
      - name: "real-time-cluster"
        layout:
          shardsCount: 1
          replicasCount: 1
    settings:
      max_insert_block_size: 1048576
  defaults:
    templates:
      podTemplate: pod-template-with-storage
  templates:
    podTemplates:
      - name: pod-template-with-storage
        spec:
          containers:
            - name: clickhouse
              image: clickhouse/clickhouse-server:23.8
              resources:
                requests:
                  memory: "1Gi"
                  cpu: "500m"