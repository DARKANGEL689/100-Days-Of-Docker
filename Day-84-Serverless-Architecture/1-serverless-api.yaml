apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: zero-scale-api
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/target: "5"
    spec:
      containers:
      - image: hashicorp/http-echo:1.0.0
        args: ["-text=SERVERLESS COLD START SUCCESSFUL: Request processed."]
        ports:
        - containerPort: 5678