apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: system-dashboard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/DARKANGEL689/100-Days-Of-Docker.git'
    path: Day-41-GitOps-ArgoCD/gitops-target
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true