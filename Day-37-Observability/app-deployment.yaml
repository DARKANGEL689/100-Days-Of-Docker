apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitored-api
  labels:
    app: monitored-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitored-api
  template:
    metadata:
      labels:
        app: monitored-api
    spec:
      containers:
      - name: api
        image: darkangel689/monitored-api:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: monitored-api-service
  labels:
    app: monitored-api
spec:
  selector:
    app: monitored-api
  ports:
    - name: http
      port: 80
      targetPort: 8080