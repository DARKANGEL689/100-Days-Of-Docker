apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "2"
spec:
  ingressClassName: nginx
  rules:
  - host: grafana.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cluster-metrics-grafana
            port:
              number: 80
      - path: /api 
        pathType: Prefix
        backend:
          service:
            name: billing-service
            port:
              number: 80