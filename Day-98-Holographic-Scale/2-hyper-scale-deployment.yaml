apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyper-scale-api
  namespace: default
spec:
  replicas: 2500 
  selector:
    matchLabels:
      app: ghost-workload
  template:
    metadata:
      labels:
        app: ghost-workload
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: type
                operator: In
                values:
                - kwok
      tolerations:
      - key: "kwok.x-k8s.io/node"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: api
        image: hashicorp/http-echo:1.0.0
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"