apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: antigravityengines.protocol.com
spec:
  group: protocol.com
  names:
    kind: AntigravityEngine
    listKind: AntigravityEngineList
    plural: antigravityengines
    singular: antigravityengine
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                thrustLevel:
                  type: string
                plasmaCore:
                  type: boolean