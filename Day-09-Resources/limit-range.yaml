apiVersion: v1
kind: LimitRange
metadata:
  name: default-bouncer-rules
spec:
  limits:
  - default:
      cpu: "200m"
      memory: "100Mi"
    defaultRequest:
      cpu: "100m"
      memory: "50Mi"
    type: Container
---
apiVersion: v1
kind: Pod
metadata:
  name: forgetful-dev-pod
spec:
  containers:
  - name: lazy-app
    image: alpine
    command: ["sleep", "3600"]