apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-kustomize-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/DARKANGEL689/100-Days-Of-Docker.git'
    targetRevision: main
    path: Day-34-Kustomize/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true