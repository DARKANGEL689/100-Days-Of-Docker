apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-critical-api
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: target
  template:
    metadata:
      labels:
        app: target
    spec:
      containers:
      - name: api
        image: nginx:alpine
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"