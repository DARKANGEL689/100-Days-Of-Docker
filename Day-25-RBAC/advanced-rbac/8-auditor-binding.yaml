apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-auditor
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: global-auditor-binding
subjects:
- kind: ServiceAccount
  name: security-auditor
  namespace: default
roleRef:
  kind: ClusterRole
  name: global-security-auditor
  apiGroup: rbac.authorization.k8s.io