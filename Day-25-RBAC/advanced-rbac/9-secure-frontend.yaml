apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      automountServiceAccountToken: false 
      containers:
      - name: nginx
        image: nginx:alpine