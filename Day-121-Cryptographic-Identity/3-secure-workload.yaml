apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-accessor
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-secure-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-api
  template:
    metadata:
      labels:
        app: secure-api
    spec:
      serviceAccountName: vault-accessor
      containers:
      - name: secure-api
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args: ["sleep infinity"]
        volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
      volumes:
      - name: spiffe-workload-api
        csi:
          driver: "csi.spiffe.io"
          readOnly: true