name: Build, Push, and Update GitOps

# 1. The Trigger: Run this pipeline whenever code is pushed to the main branch
on:
  push:
    branches:
      - main
    # Only trigger if the push changes code in this specific folder
    paths:
      - 'Day-35-CI-CD-Bridge/**'

jobs:
  build-and-patch:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone the GitHub Repository onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Log into Docker Hub (Using secure secrets we will set up next)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Install Kustomize on the runner
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      # Step 4: The CI Phase - Build the Image and tag it with the unique GitHub Commit ID
      - name: Build and Push Docker Image
        run: |
          cd Day-35-CI-CD-Bridge
          # Build the image using the Dockerfile we just created
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-api:${{ github.sha }} .
          # Push the image to the live Docker Hub registry
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-api:${{ github.sha }}

      # Step 5: The CD Bridge - Update Kustomize and push back to GitHub!
      - name: Update Kubernetes Manifests
        run: |
          cd Day-35-CI-CD-Bridge
          # Change the image tag to the unique commit ID
          kustomize edit set image DARKANGEL689/my-api=${{ secrets.DOCKERHUB_USERNAME }}/my-api:${{ github.sha }}
          
          # Commit the changes back to the repository
          git config --global user.name "GitHub Actions CI Robot"
          git config --global user.email "ahadsd1959083@gmail.com"
          git add kustomization.yaml
          git commit -m "🤖 Auto-Patch: Updated image tag to ${{ github.sha }}"
          git push