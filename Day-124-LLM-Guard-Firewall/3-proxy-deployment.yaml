apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway-firewall
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-firewall
  template:
    metadata:
      labels:
        app: ai-firewall
    spec:
      containers:
      - name: proxy
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install --quiet llm-guard && python /scripts/proxy.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: policy-vol
          mountPath: /config
        - name: scripts-vol
          mountPath: /scripts
      volumes:
      - name: policy-vol
        configMap:
          name: llm-guard-policy
      - name: scripts-vol
        configMap:
          name: llm-guard-proxy-script
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway-firewall-svc
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: ai-firewall