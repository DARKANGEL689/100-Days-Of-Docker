apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retry-router
  annotations:
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503 http_504"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /stable
        pathType: Prefix
        backend:
          service:
            name: search-service
            port:
              number: 80