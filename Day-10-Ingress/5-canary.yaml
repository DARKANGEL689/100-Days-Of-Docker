apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canary-router
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /search
        pathType: Prefix
        backend:
          service:
            name: video-service 
            port:
              number: 80