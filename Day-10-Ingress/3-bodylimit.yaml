apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: upload-router
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /upload
        pathType: Prefix
        backend:
          service:
            name: search-service
            port:
              number: 80