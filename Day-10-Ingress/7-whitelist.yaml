apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-router
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: "127.0.0.1/32"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: video-service
            port:
              number: 80