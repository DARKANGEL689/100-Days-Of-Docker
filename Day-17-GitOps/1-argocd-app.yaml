apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/DARKANGEL689/100-Days-Of-Docker.git'
    path: Day-16-Helm/frontend-app 
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc' 
    namespace: default
  syncPolicy:
    automated:
      prune: true    
      selfHeal: true 