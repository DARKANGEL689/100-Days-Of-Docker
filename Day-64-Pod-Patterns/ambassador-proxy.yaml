apiVersion: v1
kind: Pod
metadata:
  name: network-ambassador
spec:
  containers:
  - name: legacy-app
    image: curlimages/curl:latest
    command: ['sh', '-c', 'while true; do sleep 3600; done']
  - name: proxy-ambassador
    image: nginx:alpine
    volumeMounts:
    - name: nginx-config
      mountPath: /etc/nginx/conf.d
  volumes:
  - name: nginx-config
    configMap:
      name: ambassador-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ambassador-config
data:
  default.conf: |
    server {
        listen 8080;
        location / {
            proxy_pass https://www.google.com;
        }
    }