apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: the-300-protocol-ca
  namespace: cert-manager
spec:
  isCA: true 
  commonName: the-300-protocol-ca
  secretName: root-ca-secret 
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: selfsigned-bootstrap-issuer
    kind: ClusterIssuer
    group: cert-manager.io