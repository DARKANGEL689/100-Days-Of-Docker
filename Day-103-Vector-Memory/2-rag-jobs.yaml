apiVersion: batch/v1
kind: Job
metadata:
  name: memory-ingestion-run
spec:
  template:
    spec:
      containers:
      - name: python-ingest
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install --quiet openai qdrant-client sentence-transformers && python /app/ingest.py"]
        volumeMounts:
        - name: script-volume
          mountPath: /app
      restartPolicy: Never
      volumes:
      - name: script-volume
        configMap:
          name: rag-python-scripts
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rag-agent-run
spec:
  template:
    spec:
      containers:
      - name: python-agent
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install --quiet openai qdrant-client sentence-transformers && python /app/agent.py"]
        volumeMounts:
        - name: script-volume
          mountPath: /app
      restartPolicy: Never
      volumes:
      - name: script-volume
        configMap:
          name: rag-python-scripts