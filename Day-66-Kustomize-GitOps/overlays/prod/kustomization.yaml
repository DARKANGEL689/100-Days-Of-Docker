apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

namePrefix: prod-

commonLabels:
  environment: production

replicas:
- name: api-server
  count: 3

patches:
- target:
    kind: Deployment
    name: api-server
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/args/0
      value: "-text=PRODUCTION ENVIRONMENT: Live Traffic"

patchesStrategicMerge:
- security-patch.yaml 