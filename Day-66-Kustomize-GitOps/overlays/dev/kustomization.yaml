apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

namePrefix: dev-

commonLabels:
  environment: development

patches:
- target:
    kind: Deployment
    name: api-server
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/args/0
      value: "-text=DEVELOPMENT ENVIRONMENT: Debug Mode Active"