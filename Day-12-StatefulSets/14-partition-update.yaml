apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: canary-db
spec:
  serviceName: "db-service"
  replicas: 3
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 2 
  selector:
    matchLabels:
      app: canary
  template:
    metadata:
      labels:
        app: canary
    spec:
      containers:
      - name: db
        image: nginx:alpine