apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-burner
  namespace: default
spec:
  selector:
    matchLabels:
      app: cpu-burner
  template:
    metadata:
      labels:
        app: cpu-burner
    spec:
      containers:
      - name: php-apache
        image: registry.k8s.io/hpa-example 
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m 
          limits:
            cpu: 200m 
---
apiVersion: v1
kind: Service
metadata:
  name: cpu-burner-svc
  namespace: default
spec:
  ports:
  - port: 80
  selector:
    app: cpu-burner